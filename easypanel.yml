services:
  opencode:
    type: app
    build:
      type: dockerfile
      file: Dockerfile
    domains:
      - host: "$(PRIMARY_DOMAIN)"
        port: 3000
        https: true
    env:
      PORT: "3000"
      OPENCODE_WORKSPACE: /workspace
      OPENCODE_SERVER_PASSWORD: "$(OPENCODE_SERVER_PASSWORD)"
      OPENCODE_PORT: "21294"
      OPERATOR_PORT: "3001"
      NODE_ENV: "production"
      TZ: "America/Bogota"
      DISPLAY: ":99"
      AGENT_SERVER_URL: "wss://opencode1-opencopro.2xs2bu.easypanel.host/agent"


      # DB (PostgreSQL - crear servicio separado en EasyPanel)
      DB_HOST: "$(DB_HOST)"
      DB_PORT: "$(DB_PORT)"
      DB_USER: "$(DB_USER)"
      DB_PASSWORD: "$(DB_PASSWORD)"
      DB_NAME: "$(DB_NAME)"
      DATABASE_URL: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable"

      # APIs de IA
      GROQ_API_KEY: "$(GROQ_API_KEY)"
      OPENROUTER_API_KEY: "$(OPENROUTER_API_KEY)"
      CEREBRAS_API_KEY: "$(CEREBRAS_API_KEY)"
      TOGETHER_AI_API_KEY: "$(TOGETHER_AI_API_KEY)"
      ANTHROPIC_API_KEY: "$(ANTHROPIC_API_KEY)"
      OPENAI_API_KEY: "$(OPENAI_API_KEY)"
      GOOGLE_GENERATIVE_AI_API_KEY: "$(GOOGLE_GENERATIVE_AI_API_KEY)"
      MISTRAL_API_KEY: "$(MISTRAL_API_KEY)"
      XAI_API_KEY: "$(XAI_API_KEY)"
      PUTER_AUTH_TOKEN: "$(PUTER_AUTH_TOKEN)"
      OLLAMA_HOST: "$(OLLAMA_HOST)"
    ports:
      - "21293:3000"
    mounts:
      - type: volume
        name: opencode-workspace
        mountPath: /workspace
      - type: volume
        name: opencode-data
        mountPath: /root/.local/share/opencode
      - type: volume
        name: opencode-config
        mountPath: /root/.config/opencode
